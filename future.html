<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Sheet - DnD Roguelike</title>
    <link rel="stylesheet" href="future-app.bundle.css?v=1" />
  </head>
  <body data-vtt-view="player" data-multiplayer-scope="characters">
    <main class="future-app">
      <header class="future-header">
        <div>
          <p class="eyebrow">Player</p>
          <h1>Character Sheet</h1>
        </div>
        <nav class="nav-actions" aria-label="Page links">
          <a href="player-lobby.html">Lobby</a>
          <a href="character-builder.html">Rebuild Character</a>
        </nav>
      </header>

      <section class="multiplayer-bar" data-multiplayer-mount aria-label="Multiplayer connection">
        <div class="multiplayer-summary">
          <span class="connection-dot"></span>
          <div>
            <strong>Loading your lobby…</strong>
            <small>Your saved sheet is available while the connection starts.</small>
          </div>
        </div>
      </section>

      <section class="reward-roller" aria-labelledby="floor-reward-title">
        <div class="roller-header">
          <div>
            <p class="eyebrow">Rewards from your DM</p>
            <h2 id="floor-reward-title">Reward Inbox</h2>
          </div>
        </div>
        <p id="reward-context" class="reward-context">Join a lobby to receive rewards from your DM.</p>
        <div id="dm-reward-grants" class="dm-reward-grants" aria-live="polite"></div>
      </section>

      <section class="saved-grid">
        <article class="saved-panel" aria-labelledby="character-title">
          <h2 id="character-title">Saved Character</h2>
          <div id="saved-character" class="saved-character"></div>
        </article>

        <article class="saved-panel stats-panel" aria-labelledby="stats-title">
          <h2 id="stats-title">Stats</h2>
          <div id="stat-tracker" class="stat-tracker"></div>
          <section class="inventory-panel" aria-labelledby="inventory-title">
            <h3 id="inventory-title">Inventory</h3>
            <div id="inventory-list" class="inventory-list"></div>
          </section>
        </article>

        <article class="saved-panel" aria-labelledby="features-title">
          <h2 id="features-title">Features</h2>
          <div id="saved-rewards" class="feature-history"></div>
        </article>
      </section>
    </main>

    <section id="level-up-choice" class="choice-screen is-hidden">
      <h1 id="level-up-choice-title">Choose your Levelup Feature</h1>
      <div id="floor-one-rewards" class="card-grid subrace-grid" aria-live="polite"></div>
      <button id="confirm-level-up" class="confirm-button" type="button" disabled>Confirm</button>
    </section>

    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="future-app.bundle.js?v=1"></script>
  </body>
</html>
